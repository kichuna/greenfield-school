services:
  - type: web
    name: greenfield-high-school
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && npx tsx prisma/seed.ts && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: greenfield-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        value: oVYMBcX9wVy3lACNalGdhqq+mxsoyQlKWRxc1rw9Eck=
      - key: NEXTAUTH_URL
        value: https://greenfield-school-w2y5.onrender.com

databases:
  - name: greenfield-db
    plan: free
    databaseName: greenfield
    user: greenfield
